<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CinemaScope | Discover Movies</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Navigation Bar -->
        <nav class="navbar">
            <div class="nav-container">
                <div class="logo">
                    <i class="fas fa-film"></i>
                    <span>Cinema<span class="highlight">Scope</span></span>
                </div>
                <div class="nav-links">
                    <button class="nav-btn active" data-category="popular">
                        <i class="fas fa-fire"></i> Popular
                    </button>
                    <button class="nav-btn" data-category="now_playing">
                        <i class="fas fa-ticket-alt"></i> Now Playing
                    </button>
                    <button class="nav-btn" data-category="top_rated">
                        <i class="fas fa-star"></i> Top Rated
                    </button>
                    <button class="nav-btn" data-category="upcoming">
                        <i class="fas fa-calendar"></i> Upcoming
                    </button>
                </div>
            </div>
        </nav>

        <!-- Hero Search Section -->
        <div class="hero-section">
            <div class="hero-content">
                <h1 class="hero-title">
                    <i class="fas fa-search"></i> Discover Your Next Favorite Movie
                </h1>
                <p class="hero-subtitle">Search through thousands of movies, get detailed info, ratings, and more</p>
                <div class="search-container">
                    <div class="search-box">
                        <i class="fas fa-search search-icon"></i>
                        <input type="text" id="searchInput" placeholder="Search for a movie... (e.g., Inception, Avengers, Titanic)">
                        <button id="searchBtn" class="search-btn">
                            <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Category Section -->
        <div class="container">
            <div class="section-header">
                <div class="section-title">
                    <i class="fas fa-fire" id="sectionIcon"></i>
                    <h2 id="sectionTitle">Popular Movies</h2>
                </div>
                <div class="section-controls">
                    <span class="movie-count" id="movieCount"></span>
                </div>
            </div>

            <!-- Movies Grid -->
            <div class="movies-grid" id="moviesGrid">
                <!-- Movie cards will be injected here -->
                <div class="loading">
                    <div class="loader"></div>
                    <p>Loading amazing movies...</p>
                </div>
            </div>

            <!-- Pagination -->
            <div class="pagination" id="pagination">
                <button class="page-btn" id="prevPage" disabled>
                    <i class="fas fa-chevron-left"></i> Previous
                </button>
                <div class="page-numbers" id="pageNumbers">
                    <span class="page-info">Page <span id="currentPage">1</span></span>
                </div>
                <button class="page-btn" id="nextPage">
                    Next <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Movie Modal -->
    <div id="movieModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle"></h2>
                <span class="close-modal">&times;</span>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Modal content injected here -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
